name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      # ── Inject secrets as env vars at build time ──────────
      # Keys are stored in GitHub → Settings → Secrets → Actions
      # They are injected here and baked into the Vite bundle.
      # The Google Maps key MUST have HTTP referrer restrictions
      # set in Google Cloud Console to prevent abuse.
      - name: Build
        env:
          VITE_GOOGLE_MAPS_KEY: ${{ secrets.VITE_GOOGLE_MAPS_KEY }}
          VITE_GOOGLE_MAP_ID:   ${{ secrets.VITE_GOOGLE_MAP_ID }}
          VITE_TFL_APP_KEY:     ${{ secrets.VITE_TFL_APP_KEY }}
        run: npm run build

      # ── Deploy to GitHub Pages ────────────────────────────
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Prevents 404 on page refresh for SPA
          force_orphan: true
